{% macro render_toc(post) %}
<div class="toc">
  <ul class="toc-list">
    {% for item in post.body.toc recursive %}
    <li><a href="#{{ item.anchor }}">{{ item.title }}</a>
      {%if item.children %}<ul>{{ loop(item.children) }}</ul>{% endif %}</li>
    {% endfor %}
  </ul>
</div>
{% endmacro %}
