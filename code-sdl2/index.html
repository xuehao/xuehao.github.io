<h1 id="sdl">SDL</h1><p>学习完一本C语言入门书后，就可以尝试使用第三方库了。尽快减少玩具代码的练习，学习库和接口的相关技术，接触大型项目磨练技能。</p>
<p>SDL 就是一套很好玩的开源跨平台多媒体开发库，使用C语言写成，在类 Unix 平台上仅依赖C运行时库(glibc) 。</p>
